<div
  *ngIf="authService.isLoggedIn(); else loggedOutLayout"
  class="app-shell"
>
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <span class="sidebar-logo-text">Moodle V2</span>
      </div>

      <nav class="sidebar-nav">
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="sidebar-link"
        >
          <i class="fa-solid fa-gauge"></i>
          <span>Dashboard</span>
        </a>

        <a
          routerLink="/courses"
          routerLinkActive="active"
          class="sidebar-link"
        >
          <i class="fa-solid fa-book-open"></i>
          <span>My Courses</span>
        </a>

        <a
          routerLink="/calendar"
          routerLinkActive="active"
          class="sidebar-link"
        >
          <i class="fa-solid fa-calendar-day"></i>
          <span>Calendar</span>
        </a>

        <a
          routerLink="/grades"
          routerLinkActive="active"
          class="sidebar-link"
        >
          <i class="fa-solid fa-chart-line"></i>
          <span>Grades</span>
        </a>

        <a
          routerLink="/resources"
          routerLinkActive="active"
          class="sidebar-link"
        >
          <i class="fa-solid fa-folder-open"></i>
          <span>Resources</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <a
        routerLink="/settings"
        routerLinkActive="active"
        class="sidebar-link sidebar-link-small"
      >
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </a>

      <button
        type="button"
        class="sidebar-link sidebar-link-small logout-btn"
        (click)="logout()"
      >
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <div class="shell-main">
    <header class="topbar">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          placeholder="Search courses, assignments..."
        />
      </div>

      <div class="topbar-right">
        <button class="icon-btn" type="button">
          <i class="fa-regular fa-bell"></i>
        </button>

        <div class="profile">
          <div class="avatar"></div>
          <div class="profile-text">
            <div class="name">Alex Johnson</div>
            <div class="subtitle">Computer Science</div>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<ng-template #loggedOutLayout>
  <router-outlet></router-outlet>
</ng-template>
