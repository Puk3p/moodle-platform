<div class="auth-container">
  <div class="brand-header">
    <div class="logo-box"><span class="material-symbols-outlined">school</span></div>
    <h1>Moodle V2</h1>
  </div>

  <div class="auth-card">
    <div class="auth-body">
      <div class="text-center">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email to receive a reset link.</p>
      </div>

      <div *ngIf="successMessage" class="success-alert" style="background: #ecfdf5; color: #047857; padding: 1rem; border-radius: 0.5rem; text-align: center; border: 1px solid #a7f3d0;">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!successMessage" class="auth-form">
        <label>
          <span class="label-text">Email Address</span>
          <div class="input-wrapper">
            <span class="material-symbols-outlined icon">mail</span>
            <input type="email" formControlName="email" placeholder="student@university.edu" 
                   [class.error]="emailCtrl.invalid && emailCtrl.touched">
          </div>
          <span class="error-text" *ngIf="emailCtrl.invalid && emailCtrl.touched">Valid email required</span>
        </label>

        <button type="submit" class="submit-btn" [disabled]="form.invalid || isSubmitting">
          {{ isSubmitting ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>
      
      <div class="auth-footer" style="border:none; background:transparent; padding-bottom:0;">
         <a routerLink="/login">Back to Login</a>
      </div>
    </div>
  </div>
  <p class="copyright">© 2025 Gheorghe Asachi Technical University of Iaşi.</p>
</div>
