<div class="auth-container">
  <div class="brand-header">
    <div class="logo-box"><span class="material-symbols-outlined">school</span></div>
    <h1>Moodle V2</h1>
  </div>

  <div class="auth-card">
    <div class="auth-body">
      <div class="text-center">
        <h2>Set New Password</h2>
        <p class="subtitle">Enter your new password below.</p>
      </div>

      <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <label>
          <span class="label-text">New Password</span>
          <div class="input-wrapper">
             <span class="material-symbols-outlined icon">lock</span>
             <input type="password" formControlName="password" placeholder="Min 6 characters">
          </div>
        </label>
        
        <button type="submit" class="submit-btn" [disabled]="form.invalid || isSubmitting || !token">
          {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
       <div class="auth-footer" style="border:none; background:transparent; padding-bottom:0;">
         <a routerLink="/login">Back to Login</a>
      </div>
    </div>
  </div>
   <p class="copyright">© 2025 Gheorghe Asachi Technical University of Iaşi.</p>
</div>
