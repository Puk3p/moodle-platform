<div class="resources-page">
  <!-- Header + filtre -->
  <section class="resources-header">
    <div class="title-block">
      <h1>Resources</h1>
      <p>All course materials shared by your instructors.</p>
    </div>

    <div class="filters">
      <div class="term-select">
        <select
          [value]="selectedTerm()"
          (change)="onTermChange($any($event.target).value)"
        >
          <option *ngFor="let term of termOptions" [value]="term">
            Term: {{ term }}
          </option>
        </select>
        <span class="chevron">▾</span>
      </div>

      <div class="scope-toggle">
        <button
          type="button"
          class="pill"
          [class.active]="courseScope() === 'current'"
          (click)="setScope('current')"
        >
          Current courses
        </button>
        <button
          type="button"
          class="pill"
          [class.active]="courseScope() === 'all'"
          (click)="setScope('all')"
        >
          All courses
        </button>
      </div>

      <div class="search-wrapper">
        <span class="icon">🔍</span>
        <input
          type="text"
          placeholder="Search files, topics..."
          [value]="searchText()"
          (input)="onSearch($any($event.target).value)"
        />
      </div>
    </div>
  </section>

  <!-- Loading -->
  <div class="loading" *ngIf="loading()">
    Loading resources…
  </div>

  <!-- Lista pe cursuri -->
  <section class="courses-list" *ngIf="!loading()">
    <section
      class="course-section"
      *ngFor="let course of filteredCourses()"
    >
      <h2>
        {{ course.courseCode }}: {{ course.courseName }}
      </h2>

      <div class="files-grid">
        <button
          type="button"
          class="file-card"
          *ngFor="let file of course.files"
          (click)="onOpenFile(file.id)"
        >
          <div class="file-icon" [ngClass]="file.type">
            <!-- aici poți pune ulterior icon-uri reale, pentru moment doar litere -->
            <span class="icon-text">
              {{
                file.type === 'pdf'
                  ? 'PDF'
                  : file.type === 'doc'
                  ? 'DOC'
                  : file.type === 'slides'
                  ? 'PPT'
                  : file.type === 'zip'
                  ? 'ZIP'
                  : file.type === 'video'
                  ? 'VID'
                  : 'LINK'
              }}
            </span>
          </div>
          <div class="file-info">
            <p class="file-title">{{ file.title }}</p>
            <p class="file-size">{{ file.sizeLabel }}</p>
          </div>
        </button>
      </div>
    </section>
  </section>
</div>
